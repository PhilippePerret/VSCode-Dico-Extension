<form action="" id="entry-form" method="POST" class="hidden">
  <input type="text" name="entry[id]" class="entry-id" />
  <div id="entry-entree-container">
    <label for="entry-entree">Entrée</label>
    <input type="text" id="entry-entree" name="entry[entree]" />
  </div>
  <div id="entry-genre-container">
    <label for="entry-genre">Genre</label>
    <select name="entry[genre]" id="entry-genre"></select>
  </div>
  <div id="entry-categorie_id-container">
    <label for="entry-categorie_id">Catégorie</label>
    <input type="text" class="entry-categorie_id" name="entry[categorie_id]" />
  </div>
  <div id="entry-definition-container">
    <label for="entry-definition">Définition</label>
    <texterea id="entry-definition"></texterea>
  </div>
  <div class="buttons">
    <button type="cancel" class="btn-cancel">Renoncer</button>
    <button type="submit" class="btn-submit main">Enregistrer</button>
  </div>
</form>
